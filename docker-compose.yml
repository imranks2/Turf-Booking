  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    # depends_on:
    #   db:
    #     condition: service_healthy
    #   redis:
    #     condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             gunicorn -w 4 -k geventwebsocket.gunicorn.workers.GeventWebSocketWorker -b 0.0.0.0:5000 wsgi:app"
    expose:
      - "5000"
    ports:
      - "5000:5000"
    networks:
      - shared-net

  celery:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    # depends_on:
      # redis:
      #   condition: service_healthy
      # db:
      #   condition: service_healthy
    command: celery -A celery_worker.celery worker -l info -Q whatsapp,payouts,refunds,default
    networks:
      - shared-net

  flower:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    # depends_on:
    #   redis:
    #     condition: service_healthy
    command: celery -A celery_worker.celery flower --port=5555
    ports:
      - "5555:5555"
    networks:
      - shared-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
        VITE_RAZORPAY_KEY_ID: ${VITE_RAZORPAY_KEY_ID:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - shared-net

# volumes:
